services:
  - type: web
    name: phantom
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn phantom.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: TMDB_API_KEY
        sync: false
