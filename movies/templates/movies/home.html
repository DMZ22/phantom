{% extends "movies/base.html" %}
{% load static %}

{% block title %}Phantom - Home{% endblock %}

{% block content %}
<div x-data="homeData()" x-init="init()">

  <!-- ==========================================
       HERO CAROUSEL
       ========================================== -->
  <section class="relative h-[85vh] min-h-[500px] overflow-hidden">
    <template x-for="(movie, index) in heroMovies" :key="movie.id">
      <div
        x-show="current === index"
        x-transition:enter="transition ease-out duration-700"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-500"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="absolute inset-0"
      >
        <!-- Backdrop Image -->
        <div class="absolute inset-0">
          <img
            :src="'https://image.tmdb.org/t/p/original' + movie.backdrop_path"
            :alt="movie.title"
            class="w-full h-full object-cover"
          >
        </div>
        <!-- Gradients -->
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="absolute inset-0 hero-gradient-bottom"></div>

        <!-- Content -->
        <div class="absolute inset-0 flex items-center">
          <div class="max-w-[1400px] mx-auto px-4 sm:px-6 w-full">
            <div class="max-w-xl space-y-4">
              <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold leading-tight" x-text="movie.title"></h1>
              <div class="flex items-center space-x-4 text-sm">
                <span class="flex items-center space-x-1">
                  <svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                  </svg>
                  <span class="text-yellow-400 font-semibold" x-text="movie.vote_average?.toFixed(1)"></span>
                </span>
                <span class="text-white/50" x-text="movie.release_date?.substring(0,4)"></span>
              </div>
              <p class="text-white/70 text-sm sm:text-base line-clamp-3 leading-relaxed" x-text="movie.overview"></p>
              <div class="flex items-center space-x-3 pt-2">
                <a
                  :href="'/movie/' + movie.id + '/'"
                  class="bg-[#e50914] hover:bg-[#b20710] text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition flex items-center space-x-2"
                >
                  <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
                  </svg>
                  <span>Details</span>
                </a>
                <a
                  :href="'/book/' + movie.id + '/'"
                  class="bg-white/10 hover:bg-white/20 text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition border border-white/10"
                >
                  Book Tickets
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Slide Indicators -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center space-x-2 z-10">
      <template x-for="(movie, index) in heroMovies" :key="'dot-'+movie.id">
        <button
          @click="current = index"
          :class="current === index ? 'w-8 bg-[#e50914]' : 'w-2.5 bg-white/30 hover:bg-white/50'"
          class="h-2.5 rounded-full transition-all duration-300"
        ></button>
      </template>
    </div>

    <!-- Empty state -->
    <template x-if="heroMovies.length === 0">
      <div class="absolute inset-0 flex items-center justify-center bg-gradient-to-b from-[#1a1a1a] to-[#0a0a0a]">
        <div class="text-center space-y-4">
          <div class="text-6xl">🎬</div>
          <h2 class="text-2xl font-bold">Welcome to Phantom</h2>
          <p class="text-white/50">Discover trending movies from around the world</p>
        </div>
      </div>
    </template>
  </section>

  <!-- ==========================================
       MOVIE ROWS
       ========================================== -->
  <div class="relative z-10 -mt-20 space-y-10 pb-10">

    <!-- Trending in Region -->
    <section class="max-w-[1400px] mx-auto px-4 sm:px-6" x-show="trendingMovies.length > 0">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl sm:text-2xl font-bold">
          Trending in <span class="text-[#e50914]" x-text="$store.region.currentRegion.name"></span>
        </h2>
        <div class="flex items-center space-x-1">
          <button @click="scrollRow($el, 'left')" class="p-2 rounded-full hover:bg-white/10 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button @click="scrollRow($el, 'right')" class="p-2 rounded-full hover:bg-white/10 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      <div class="overflow-x-auto hide-scrollbar">
        <div class="flex space-x-4 pb-4">
          <template x-for="movie in trendingMovies" :key="movie.id">
            <a :href="'/movie/' + movie.id + '/'" class="flex-shrink-0 w-40 sm:w-48 group">
              <div class="relative rounded-lg overflow-hidden aspect-[2/3] bg-white/5">
                <img
                  :src="movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : ''"
                  :alt="movie.title"
                  class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                  loading="lazy"
                >
                <div class="absolute inset-0 card-gradient opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div class="absolute bottom-0 left-0 right-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                  <p class="text-sm font-semibold truncate" x-text="movie.title"></p>
                </div>
                <!-- Rating badge -->
                <div class="absolute top-2 right-2">
                  <span
                    :class="movie.vote_average >= 7 ? 'bg-green-600' : movie.vote_average >= 5 ? 'bg-yellow-600' : 'bg-red-600'"
                    class="text-xs font-bold px-1.5 py-0.5 rounded"
                    x-text="movie.vote_average?.toFixed(1)"
                  ></span>
                </div>
              </div>
              <p class="mt-2 text-sm text-white/70 truncate group-hover:text-white transition" x-text="movie.title"></p>
            </a>
          </template>
        </div>
      </div>
    </section>

    <!-- Top 10 Global -->
    <section class="max-w-[1400px] mx-auto px-4 sm:px-6" x-show="topRatedMovies.length > 0">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl sm:text-2xl font-bold">Top 10 Global</h2>
        <div class="flex items-center space-x-2">
          <div class="flex items-center space-x-1 mr-4">
            <template x-for="period in ['day', 'week']" :key="period">
              <button
                @click="switchTopPeriod(period)"
                :class="topPeriod === period ? 'bg-[#e50914] text-white' : 'bg-white/10 text-white/60 hover:text-white'"
                class="px-3 py-1 rounded-full text-xs font-medium transition"
                x-text="period === 'day' ? 'Today' : 'This Week'"
              ></button>
            </template>
          </div>
          <button @click="scrollRow($el, 'left')" class="p-2 rounded-full hover:bg-white/10 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button @click="scrollRow($el, 'right')" class="p-2 rounded-full hover:bg-white/10 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      <div class="overflow-x-auto hide-scrollbar">
        <div class="flex space-x-4 pb-4">
          <template x-for="(movie, idx) in topRatedMovies.slice(0, 10)" :key="movie.id">
            <a :href="'/movie/' + movie.id + '/'" class="flex-shrink-0 w-40 sm:w-48 group relative">
              <!-- Rank Number -->
              <div class="absolute -left-2 -bottom-2 z-10 text-7xl font-black text-white/10 leading-none select-none" x-text="idx + 1" style="font-family: Inter, sans-serif;"></div>
              <div class="relative rounded-lg overflow-hidden aspect-[2/3] bg-white/5">
                <img
                  :src="movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : ''"
                  :alt="movie.title"
                  class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                  loading="lazy"
                >
                <div class="absolute inset-0 card-gradient opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div class="absolute bottom-0 left-0 right-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                  <p class="text-sm font-semibold truncate" x-text="movie.title"></p>
                </div>
                <div class="absolute top-2 right-2">
                  <span
                    :class="movie.vote_average >= 7 ? 'bg-green-600' : movie.vote_average >= 5 ? 'bg-yellow-600' : 'bg-red-600'"
                    class="text-xs font-bold px-1.5 py-0.5 rounded"
                    x-text="movie.vote_average?.toFixed(1)"
                  ></span>
                </div>
              </div>
              <p class="mt-2 text-sm text-white/70 truncate group-hover:text-white transition" x-text="movie.title"></p>
            </a>
          </template>
        </div>
      </div>
    </section>

    <!-- Now Playing -->
    <section class="max-w-[1400px] mx-auto px-4 sm:px-6" x-show="nowPlayingMovies.length > 0">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl sm:text-2xl font-bold">
          Now Playing in <span class="text-[#e50914]" x-text="$store.region.currentRegion.name"></span>
        </h2>
        <div class="flex items-center space-x-1">
          <button @click="scrollRow($el, 'left')" class="p-2 rounded-full hover:bg-white/10 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button @click="scrollRow($el, 'right')" class="p-2 rounded-full hover:bg-white/10 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      <div class="overflow-x-auto hide-scrollbar">
        <div class="flex space-x-4 pb-4">
          <template x-for="movie in nowPlayingMovies" :key="movie.id">
            <a :href="'/movie/' + movie.id + '/'" class="flex-shrink-0 w-40 sm:w-48 group">
              <div class="relative rounded-lg overflow-hidden aspect-[2/3] bg-white/5">
                <img
                  :src="movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : ''"
                  :alt="movie.title"
                  class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                  loading="lazy"
                >
                <div class="absolute inset-0 card-gradient opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div class="absolute bottom-0 left-0 right-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                  <p class="text-sm font-semibold truncate" x-text="movie.title"></p>
                </div>
                <div class="absolute top-2 right-2">
                  <span
                    :class="movie.vote_average >= 7 ? 'bg-green-600' : movie.vote_average >= 5 ? 'bg-yellow-600' : 'bg-red-600'"
                    class="text-xs font-bold px-1.5 py-0.5 rounded"
                    x-text="movie.vote_average?.toFixed(1)"
                  ></span>
                </div>
              </div>
              <p class="mt-2 text-sm text-white/70 truncate group-hover:text-white transition" x-text="movie.title"></p>
            </a>
          </template>
        </div>
      </div>
    </section>

    <!-- Popular This Week -->
    <section class="max-w-[1400px] mx-auto px-4 sm:px-6" x-show="popularMovies.length > 0">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl sm:text-2xl font-bold">Popular This Week</h2>
        <div class="flex items-center space-x-1">
          <button @click="scrollRow($el, 'left')" class="p-2 rounded-full hover:bg-white/10 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button @click="scrollRow($el, 'right')" class="p-2 rounded-full hover:bg-white/10 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      <div class="overflow-x-auto hide-scrollbar">
        <div class="flex space-x-4 pb-4">
          <template x-for="movie in popularMovies" :key="movie.id">
            <a :href="'/movie/' + movie.id + '/'" class="flex-shrink-0 w-40 sm:w-48 group">
              <div class="relative rounded-lg overflow-hidden aspect-[2/3] bg-white/5">
                <img
                  :src="movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : ''"
                  :alt="movie.title"
                  class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                  loading="lazy"
                >
                <div class="absolute inset-0 card-gradient opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div class="absolute bottom-0 left-0 right-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                  <p class="text-sm font-semibold truncate" x-text="movie.title"></p>
                </div>
                <div class="absolute top-2 right-2">
                  <span
                    :class="movie.vote_average >= 7 ? 'bg-green-600' : movie.vote_average >= 5 ? 'bg-yellow-600' : 'bg-red-600'"
                    class="text-xs font-bold px-1.5 py-0.5 rounded"
                    x-text="movie.vote_average?.toFixed(1)"
                  ></span>
                </div>
              </div>
              <p class="mt-2 text-sm text-white/70 truncate group-hover:text-white transition" x-text="movie.title"></p>
            </a>
          </template>
        </div>
      </div>
    </section>

  </div>
</div>

<script>
function homeData() {
  return {
    current: 0,
    heroMovies: [],
    trendingMovies: [],
    topRatedMovies: [],
    nowPlayingMovies: [],
    popularMovies: [],
    topPeriod: 'week',
    _interval: null,

    init() {
      // Parse data injected from Django
      try {
        this.heroMovies = JSON.parse('{{ hero_json|escapejs }}' || '[]');
      } catch(e) { this.heroMovies = []; }
      try {
        this.trendingMovies = JSON.parse('{{ trending_json|escapejs }}' || '[]');
      } catch(e) { this.trendingMovies = []; }
      try {
        this.topRatedMovies = JSON.parse('{{ top_rated_json|escapejs }}' || '[]');
      } catch(e) { this.topRatedMovies = []; }
      try {
        this.nowPlayingMovies = JSON.parse('{{ now_playing_json|escapejs }}' || '[]');
      } catch(e) { this.nowPlayingMovies = []; }
      try {
        this.popularMovies = JSON.parse('{{ popular_json|escapejs }}' || '[]');
      } catch(e) { this.popularMovies = []; }

      // Auto-rotate hero
      if (this.heroMovies.length > 1) {
        this._interval = setInterval(() => {
          this.current = (this.current + 1) % this.heroMovies.length;
        }, 8000);
      }
    },

    async switchTopPeriod(period) {
      this.topPeriod = period;
      try {
        const region = this.$store.region.code;
        const res = await fetch(`/api/movies/trending/?window=${period}&region=${region}`);
        const data = await res.json();
        if (data.results) {
          this.topRatedMovies = data.results.slice(0, 10);
        }
      } catch(e) {
        console.warn('Failed to fetch top movies:', e);
      }
    },
  };
}
</script>
{% endblock %}
